apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: "https://github.com/hweyoung/atlassian-k8s-gitops.git"
    targetRevision: main
    path: apps                               # apps/ 폴더 안의 yaml을 모두 감시

  destination:
    server: "https://kubernetes.default.svc" #k8s 내부 주소
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
