jira:
  image:
    repository: atlassian/jira-software
    tag: "9.12.0"
    pullPolicy: IfNotPresent

  jvmConfig:
    jvmMinHeapSize: "384m"
    jvmMaxHeapSize: "768m"
    jvmAdditionalOptions: >-
      -XX:+UseG1GC
      -XX:MaxGCPauseMillis=200
      -XX:+HeapDumpOnOutOfMemoryError
      -XX:HeapDumpPath=/var/atlassian/application-data/jira/heap.hprof

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "1.5Gi"

  datasource:
    url: "jdbc:postgresql://infra-node.orb.local:5432/jiradb"
    username: "jira"
    password: "jira"
    driver: "org.postgresql.Driver"

  sharedHome:
    nfsPermissionFixer:
      enabled: true
    customVolume:
      nfs:
        server: "infra-node.orb.local"
        path: "/data/shared-home/jira-shared-home"

  ingress:
    create: true
    className: "traefik"
    host: "jira.orb.local"

  readinessProbe:
    initialDelaySeconds: 120
    periodSeconds: 10
    failureThreshold: 30

  livenessProbe:
    initialDelaySeconds: 180
    periodSeconds: 20
    failureThreshold: 10
