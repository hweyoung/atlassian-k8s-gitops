---
- name: 1. 전체 노드 공통 설정
  hosts: all
  become: yes
  roles: [ base ]
  tags: [ base ]

- name: 2. PostgreSQL 구축
  hosts: infra
  become: yes
  roles: [ postgresql ]
  tags: [ postgresql ]

- name: 3. NFS 서버 구축
  hosts: infra
  become: yes
  roles: [ nfs_server ]
  tags: [ nfs_server ]

- name: 3-1. NFS 클라이언트 마운트 설정
  hosts: k3s_cluster          
  become: yes
  roles: [ nfs_client ]
  tags: [ nfs_client ]

- name: 4. K3s 방화벽 설정
  hosts: k3s_cluster
  become: yes
  roles: [ k3s_firewall ]
  tags: [ k3s_firewall ]

- name: 5. K3s Master 구성
  hosts: k3s_master
  become: yes
  roles: [ k3s_master ]
  tags: [ k3s_master ]

- name: 6. K3s Worker 구성
  hosts: k3s_worker
  become: yes
  roles: [ k3s_worker ]
  tags: [ k3s_worker ]

- name: 7. Helm 설치 
  hosts: k3s_master
  become: yes                        # 바이너리 설치이므로 sudo 필요
  roles: [ helm ]
  tags: [ helm ] 

- name: 8. ArgoCD 배포
  hosts: k3s_master
  become: no                         # Helm 실행은 일반 유저로
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
  roles: [ argocd ]
  tags: [ argocd ]