---
- name: .kube 디렉토리 생성
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    mode: '0755'

# k3s.yaml은 root 소유 파일이므로 이 Task만 sudo가 필요합니다.
# Play 전체를 become: yes로 올리면 Helm 명령이 root로 실행되어 충돌이 발생합니다.
- name: k3s.yaml을 사용자 kubeconfig로 복사
  become: yes
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: KUBECONFIG 환경변수 영구 설정
  blockinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: kubeconfig"
    block: |
      export KUBECONFIG=~/.kube/config